services:
  app:
    user: root
    build: .
    volumes:
      - .:/rails
      - bundle:/usr/local/bundle
    ports:
      - "3000:3000"
    environment:
      SECRET_KEY_BASE: "your_secret_key_here"
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails server -b 0.0.0.0"

volumes:
  bundle:
